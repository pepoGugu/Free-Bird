<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Comprima e converta vídeos para WebM direto no navegador."
    />
    <meta name="theme-color" content="#12c7b5" />
    <title>Passarinho WebM</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"
    ></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="./" aria-label="Passarinho WebM">
          <img src="./favicon.svg" alt="" class="brand-mark" />
          <span>
            <strong>Passarinho</strong>
            <small>WebM</small>
          </span>
        </a>

        <div class="topbar-actions">
          <span class="status-chip" id="supportStatus">
            <i data-lucide="cpu"></i>
            Pronto no navegador
          </span>
          <button class="icon-button" type="button" id="themeToggle" aria-label="Alternar tema">
            <i data-lucide="moon"></i>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="converter-panel" aria-labelledby="appTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Conversor local</p>
              <h1 id="appTitle">Vídeo para WebM, comprimido para GitHub.</h1>
            </div>
            <button class="ghost-button" type="button" id="resetButton">
              <i data-lucide="rotate-ccw"></i>
              Limpar
            </button>
          </div>

          <label class="drop-zone" id="dropZone" for="fileInput">
            <input id="fileInput" type="file" accept="video/*,.mkv,.avi,.mov,.mp4,.webm,.wmv,.flv,.m4v" />
            <span class="drop-icon"><i data-lucide="upload-cloud"></i></span>
            <span class="drop-title">Arraste um vídeo aqui ou clique para escolher</span>
            <span class="drop-subtitle">Tudo roda no seu navegador. O arquivo não é enviado para servidor.</span>
          </label>

          <div class="file-strip" id="fileStrip" hidden>
            <div>
              <strong id="fileName">video.mp4</strong>
              <span id="fileMeta">0 MB</span>
            </div>
            <button class="icon-button subtle" type="button" id="removeFile" aria-label="Remover vídeo">
              <i data-lucide="x"></i>
            </button>
          </div>

          <div class="settings-grid">
            <div class="setting">
              <div class="setting-label">
                <label for="qualityRange">Compressão</label>
                <output id="qualityValue" for="qualityRange">Equilibrado</output>
              </div>
              <input id="qualityRange" type="range" min="18" max="40" value="32" />
              <div class="scale-hints" aria-hidden="true">
                <span>Mais qualidade</span>
                <span>Menor arquivo</span>
              </div>
            </div>

            <label class="setting">
              <span class="setting-label">
                <span>Tamanho</span>
              </span>
              <select id="sizeSelect">
                <option value="original">Original</option>
                <option value="1080">Até 1080p</option>
                <option value="720" selected>Até 720p</option>
                <option value="480">Até 480p</option>
                <option value="360">Até 360p</option>
              </select>
            </label>

            <label class="setting">
              <span class="setting-label">
                <span>Quadros</span>
              </span>
              <select id="fpsSelect">
                <option value="original" selected>Original</option>
                <option value="30">30 fps</option>
                <option value="24">24 fps</option>
                <option value="15">15 fps</option>
              </select>
            </label>

            <label class="setting">
              <span class="setting-label">
                <span>Codec</span>
              </span>
              <select id="codecSelect">
                <option value="vp9" selected>VP9 menor</option>
                <option value="vp8">VP8 mais rápido</option>
              </select>
            </label>

            <label class="toggle-row">
              <input id="removeAudio" type="checkbox" />
              <span class="toggle-ui" aria-hidden="true"></span>
              <span>Remover áudio</span>
            </label>
          </div>

          <div class="actions-row">
            <button class="primary-button" type="button" id="convertButton" disabled>
              <i data-lucide="file-video"></i>
              Converter para WebM
            </button>
            <a class="download-button" id="downloadLink" hidden>
              <i data-lucide="download"></i>
              Baixar WebM
            </a>
          </div>

          <div class="progress-wrap" id="progressWrap" hidden>
            <div class="progress-info">
              <span id="progressLabel">Preparando FFmpeg...</span>
              <span id="progressPercent">0%</span>
            </div>
            <progress id="progressBar" value="0" max="100"></progress>
          </div>

          <p class="message" id="message" role="status" aria-live="polite"></p>
        </section>

        <aside class="preview-panel" aria-label="Prévia do vídeo">
          <div class="preview-box">
            <video id="videoPreview" controls playsinline hidden></video>
            <div class="preview-empty" id="previewEmpty">
              <i data-lucide="film"></i>
              <span>Prévia aparece aqui</span>
            </div>
          </div>

          <div class="stats-grid">
            <div>
              <span>Entrada</span>
              <strong id="inputSize">-</strong>
            </div>
            <div>
              <span>Saída</span>
              <strong id="outputSize">-</strong>
            </div>
            <div>
              <span>Redução</span>
              <strong id="savingSize">-</strong>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
